<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hackathon Platform | Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <div class="auth-layout">
    <div class="glass-card animate-slide-up" style="width: 100%; max-width: 400px;">
      
      <div class="text-center mb-lg">
        <h2 class="text-gradient">HackClub</h2>
        <p class="text-secondary mt-sm">Leader Authentication</p>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="leader@example.com" required>
        </div>
        
        <div class="form-group mb-lg">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>

      <!-- Signup Form (Hidden by default) -->
      <form id="signup-form" class="hidden">
        <div class="form-group">
          <label class="form-label" for="signup-name">Full Name</label>
          <input type="text" id="signup-name" class="form-control" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-email">Email</label>
          <input type="email" id="signup-email" class="form-control" placeholder="leader@example.com" required>
        </div>
        
        <div class="form-group mb-lg">
          <label class="form-label" for="signup-password">Password (6+ chars)</label>
          <input type="password" id="signup-password" class="form-control" placeholder="••••••••" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <div class="text-center mt-md">
        <p class="text-secondary" style="font-size: 0.9rem;">
          <span id="toggle-text">Don't have an account?</span> 
          <a href="#" id="toggle-form" class="text-gradient">Sign up here</a>
        </p>
      </div>

    </div>
  </div>

  <script src="js/ui.js"></script>
  <script type="module" src="js/auth.js"></script>

</body>
</html>
